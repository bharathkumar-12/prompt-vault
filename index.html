<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Library</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Prompt Library</h1>
        <p>Save and manage your prompts</p>
        <div class="header-controls">
          <button id="exportBtn" class="btn">Export Prompts</button>
          <button id="importBtn" class="btn">Import Prompts</button>
          <input
            id="importFile"
            type="file"
            accept="application/json"
            style="display: none"
          />
        </div>
      </header>

      <main>
        <section class="form-section">
          <h2>Create New Prompt</h2>
          <form id="promptForm">
            <div class="form-group">
              <label for="promptTitle">Prompt Title</label>
              <input
                type="text"
                id="promptTitle"
                placeholder="Enter prompt title..."
                required
              />
            </div>
            <div class="form-group">
              <label for="promptContent">Prompt Content</label>
              <textarea
                id="promptContent"
                placeholder="Enter prompt content..."
                rows="5"
                required
              ></textarea>
            </div>
            <div class="form-group">
              <label for="modelName">Model Name</label>
              <input
                type="text"
                id="modelName"
                maxlength="100"
                placeholder="e.g. gpt-4o-mini or gpt-4"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">Save Prompt</button>
          </form>
        </section>

        <section class="prompts-section">
          <h2>Saved Prompts</h2>
          <div id="promptsContainer" class="prompts-grid">
            <p class="empty-state">
              No prompts saved yet. Create your first prompt above!
            </p>
          </div>
        </section>
      </main>
    </div>

    <!-- Import conflict modal -->
    <div id="conflictModal" class="modal" aria-hidden="true">
      <div class="modal-dialog">
        <h3>Import Conflict</h3>
        <p id="conflictMessage">
          There are duplicate prompt IDs. Choose how to resolve conflicts.
        </p>
        <div class="modal-actions">
          <button id="conflictMerge" class="btn">Merge (update fields)</button>
          <button id="conflictOverwrite" class="btn">Overwrite</button>
          <button id="conflictCreateNew" class="btn">Create New IDs</button>
          <button id="conflictCancel" class="btn btn-delete">Cancel</button>
        </div>
      </div>
    </div>

    <div id="messageArea" class="message-area" aria-live="polite"></div>
    <script src="script.js"></script>
  </body>
</html>
